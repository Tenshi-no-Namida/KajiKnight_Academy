<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲームスコア計算ツール</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #3498db;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .level-select {
            margin-bottom: 25px;
            padding: 15px;
            background: #eef2f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .level-select select {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .slot-card {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff;
        }
        .slot-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slot-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        select, input[type="checkbox"] {
            cursor: pointer;
        }
        .slot-inputs select {
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #2c3e50;
            color: #fff;
            border-radius: 8px;
            text-align: center;
        }
        .total-score {
            font-size: 36px;
            font-weight: bold;
            color: #2ecc71;
            margin: 10px 0;
        }
        .details {
            font-size: 14px;
            color: #bdc3c7;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ゲームスコア計算ツール</h1>

    <div class="level-select">
        <label for="gameLevel"><strong>ゲームレベル:</strong></label>
        <select id="gameLevel" onchange="calculate()">
            <option value="初級">初級 (n=1)</option>
            <option value="三級">三級 (n=2)</option>
            <option value="二級">二級 (n=3)</option>
            <option value="一級">一級 (n=4)</option>
        </select>
    </div>

    <div class="slot-card">
        <div class="slot-title">
            <span>スロット 1 (常時2倍※カカシ除)</span>
            <label class="checkbox-container">
                <input type="checkbox" id="complete1" checked onchange="calculate()"> 完成
            </label>
        </div>
        <div class="slot-inputs">
            <select id="color1" onchange="calculate()">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type1" onchange="calculate()">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-title">
            <span>スロット 2</span>
            <label class="checkbox-container">
                <input type="checkbox" id="complete2" checked onchange="calculate()"> 完成
            </label>
        </div>
        <div class="slot-inputs">
            <select id="color2" onchange="calculate()">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type2" onchange="calculate()">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-title">
            <span>スロット 3</span>
            <label class="checkbox-container">
                <input type="checkbox" id="complete3" checked onchange="calculate()"> 完成
            </label>
        </div>
        <div class="slot-inputs">
            <select id="color3" onchange="calculate()">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type3" onchange="calculate()">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="result-box">
        <div>最終獲得スコア</div>
        <div class="total-score" id="totalScore">0</div>
        <div class="details" id="scoreDetails">
            ベース合計: 0点 | ボーナス: 0点<br>
            各スロット最終値 ➔ 1: 0点 | 2: 0点 | 3: 0点
        </div>
    </div>
</div>

<script>
function getBaseScore(type) {
    const scores = { 'ring': 1, 'charm': 2, 'bracelet': 3, 'necklace': 5 };
    return scores[type] || 0;
}

function calculate() {
    const gameLevel = document.getElementById('gameLevel').value;
    const nMap = { '初級': 1, '三級': 2, '二級': 3, '一級': 4 };
    const n = nMap[gameLevel] || 0;

    // 各スロットの状態取得
    const slot1 = { color: document.getElementById('color1').value, type: document.getElementById('type1').value, isCompleted: document.getElementById('complete1').checked };
    const slot2 = { color: document.getElementById('color2').value, type: document.getElementById('type2').value, isCompleted: document.getElementById('complete2').checked };
    const slot3 = { color: document.getElementById('color3').value, type: document.getElementById('type3').value, isCompleted: document.getElementById('complete3').checked };

    // ベーススコア算出（カカシは初期値0）
    let s1 = slot1.color === 'gold' ? 10 : (slot1.type === 'kakashi' ? 0 : getBaseScore(slot1.type));
    let s2 = slot2.color === 'gold' ? 10 : (slot2.type === 'kakashi' ? 0 : getBaseScore(slot2.type));
    let s3 = slot3.color === 'gold' ? 10 : (slot3.type === 'kakashi' ? 0 : getBaseScore(slot3.type));

    const k1 = slot1.type === 'kakashi' && slot1.color !== 'gold';
    const k2 = slot2.type === 'kakashi' && slot2.color !== 'gold';
    const k3 = slot3.type === 'kakashi' && slot3.color !== 'gold';

    // 【訂正ルール】スロット1がカカシ以外なら最初に2倍
    if (!k1) { s1 = s1 * 2; }

    let final1 = 0, final2 = 0, final3 = 0;

    // カカシの伝播処理
    if (!k1 && !k2 && !k3) {
        final1 = s1; final2 = s2; final3 = s3;
    } else if (k1 && !k2 && !k3) { // ①
        final2 = s2; final1 = final2; final3 = s3;
    } else if (!k1 && k2 && !k3) { // ②
        final1 = s1; final3 = s3; final2 = final1 + final3;
    } else if (!k1 && !k2 && k3) { // ③
        final1 = s1; final2 = s2; final3 = final2;
    } else if (k1 && k2 && !k3) {  // ④
        final3 = s3; final2 = final3; final1 = final2;
    } else if (k1 && !k2 && k3) {  // ⑤
        final2 = s2; final1 = final2; final3 = final2;
    } else if (!k1 && k2 && k3) {  // ⑥
        final1 = s1; final2 = final1; final3 = final2;
    } else {
        final1 = 0; final2 = 0; final3 = 0;
    }

    // 完成スロットの集計
    let baseTotal = 0;
    let completedItems = [];
    if (slot1.isCompleted) { baseTotal += final1; completedItems.push(slot1); }
    if (slot2.isCompleted) { baseTotal += final2; completedItems.push(slot2); }
    if (slot3.isCompleted) { baseTotal += final3; completedItems.push(slot3); }

    // ボーナス計算（重複なし）
    let bonus = 0;
    if (completedItems.length >= 2) {
        if (completedItems.length === 3) {
            const item1 = completedItems[0]; const item2 = completedItems[1]; const item3 = completedItems[2];
            if (item1.color === item2.color && item2.color === item3.color && item1.type === item2.type && item2.type === item3.type) {
                bonus += 2 * n;
            } else if ((item1.color === item2.color && item1.type === item2.type) || (item2.color === item3.color && item2.type === item3.type) || (item1.color === item3.color && item1.type === item3.type)) {
                bonus += 2 * n;
            } else {
                let colorMatch = (item1.color === item2.color || item2.color === item3.color || item1.color === item3.color);
                let typeMatch = (item1.type === item2.type || item2.type === item3.type || item1.type === item3.type);
                if (colorMatch) bonus += n;
                if (typeMatch) bonus += n;
            }
        } else if (completedItems.length === 2) {
            const item1 = completedItems[0]; const item2 = completedItems[1];
            if (item1.color === item2.color && item1.type === item2.type) {
                bonus += 2 * n;
            } else if (item1.color === item2.color) {
                bonus += n;
            } else if (item1.type === item2.type) {
                bonus += n;
            }
        }
    }

    // 画面への描画
    document.getElementById('totalScore').innerText = baseTotal + bonus;
    document.getElementById('scoreDetails').innerHTML = `
        ベース合計: ${baseTotal}点 | ボーナス: ${bonus}点<br>
        各スロット最終値 ➔ 1: ${final1}点 | 2: ${final2}点 | 3: ${final3}点
    `;
}

// 起動時に初期計算を実行
calculate();
</script>

</body>
</html>
