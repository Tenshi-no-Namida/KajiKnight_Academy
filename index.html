<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジナイトアカデミー 鍛冶シミュレーター（詳細分析・完全版）</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: #262636;
            --primary-color: #3498db;
            --secondary-color: #e74c3c;
            --text-color: #f0f0f5;
            --border-color: #3a3a52;
            
            /* アイテム・鉱石色の定義 */
            --color-red: #ff4d4d;
            --color-blue: #3399ff;
            --color-yellow: #f39c12;
            --color-green: #2ecc71;
            --color-gold: #f1c40f;
            --color-none: #a0a0aa;
            
            --slot1-bg: #1d142b;
            --slot1-border: #4a346b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        .slot-box {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
        }
        .slot-box.slot1 {
            background-color: var(--slot1-bg);
            border-color: var(--slot1-border);
        }
        .slot-box label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #bbb;
        }
        .slot1 label { color: #d6bbf2; }
        select, input[type="number"] {
            width: 100%;
            background-color: #12121a;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }
        select:focus, input:focus {
            border-color: var(--primary-color);
        }
        /* ストック入力 */
        .stock-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stock-label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .btn-counter {
            background: #3a3a52;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-counter:hover { background: #4e4e6e; }
        .stock-value {
            width: 30px;
            text-align: center;
            display: inline-block;
            font-weight: bold;
        }
        /* 分析エリアアコーディオン */
        .advanced-toggle-btn {
            width: 100%;
            background: #2c3e50;
            color: #fff;
            border: 1px solid #34495e;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .advanced-toggle-btn:hover { background: #34495e; }
        .advanced-panel {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }
        .ore-input-grid {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 4px;
            align-items: center;
            margin-bottom: 8px;
        }
        .ore-header {
            font-size: 11px;
            text-align: center;
            font-weight: bold;
        }
        .ore-input-grid input {
            padding: 4px;
            font-size: 12px;
            text-align: center;
        }
        /* アクションボタン */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        .btn-submit:hover { background-color: #2980b9; }
        /* 結果表示 */
        #result {
            margin-top: 20px;
        }
        .result-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            color: #fff;
            margin-right: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>カジナイト 鍛冶スコア＆精密実現分析</h1>

        </div>
        <div class="slot-box">
            <label>SLOT 3</label>

                <option value="yellow">黄色</option><option value="red">赤色</option>
                <option value="blue">青色</option><option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="s3_type" style="margin-top:6px;">
                <option value="charm">チャーム</option><option value="kakashi">カカシ</option>

    <div class="section-title">手持ちのストックレシピ数</div>
    <div id="stockContainer">
        <div class="stock-row"><div class="stock-label"><span class="color-indicator" style="background:var(--color-red)"></span>赤のレシピ (カカシ以外)</div><div><button class="btn-counter" onclick="changeStock('red', -1)">-</button><span class="stock-value" id="stock_red">2</span><button class="btn-counter" onclick="changeStock('red', 1)">+</button></div></div>
        <div class="stock-row"><div class="stock-label"><span class="color-indicator" style="background:var(--color-blue)"></span>青のレシピ (カカシ以外)</div><div><button class="btn-counter" onclick="changeStock('blue', -1)">-</button><span class="stock-value" id="stock_blue">1</span><button class="btn-counter" onclick="changeStock('blue', 1)">+</button></div></div>
        <div class="stock-row"><div class="stock-label"><span class="color-indicator" style="background:var(--color-yellow)"></span>黄のレシピ (カカシ以外)</div><div><button class="btn-counter" onclick="changeStock('yellow', -1)">-</button><span class="stock-value" id="stock_yellow">1</span><button class="btn-counter" onclick="changeStock('yellow', 1)">+</button></div></div>
        <div class="stock-row"><div class="stock-label"><span class="color-indicator" style="background:var(--color-green)"></span>緑のレシピ (カカシ以外)</div><div><button class="btn-counter" onclick="changeStock('green', -1)">-</button><span class="stock-value" id="stock_green">1</span><button class="btn-counter" onclick="changeStock('green', 1)">+</button></div></div>
        <div class="stock-row"><div class="stock-label"><span class="color-indicator" style="background:var(--color-gold)"></span>金のレシピ (カカシ以外)</div><div><button class="btn-counter" onclick="changeStock('gold', -1)">-</button><span class="stock-value" id="stock_gold">1</span><button class="btn-counter" onclick="changeStock('gold', 1)">+</button></div></div>
    </div>

    <button type="button" class="advanced-toggle-btn" onclick="toggleAdvancedPanel()">
        📊 精密な「実現可能性」分析を開く/閉じる
    </button>

    <div id="advancedPanel" class="advanced-panel">
        <div style="font-size: 13px; color: #ff9f43; margin-bottom: 12px; font-weight: bold;">
            ※今ターンの練習状況と引き継ぎ鉱石を入力し、完全に実現可能なルートだけを精密にシミュレートします。
        </div>
        
        <div style="font-weight:bold; font-size:13px; margin-bottom:6px; color:#3498db;">■ 各スロットの引き継ぎ済鉱石</div>
        <div class="ore-input-grid">
            <div></div>
            <div class="ore-header" style="color:var(--color-red)">赤R</div>
            <div class="ore-header" style="color:var(--color-blue)">青B</div>
            <div class="ore-header" style="color:var(--color-yellow)">黄Y</div>
            <div class="ore-header" style="color:var(--color-green)">緑G</div>
            <div class="ore-header" style="color:var(--color-none)">無N</div>

            <input type="number" id="inh_s1_R" value="0" min="0">

            <input type="number" id="inh_s1_G" value="0" min="0">
            <input type="number" id="inh_s1_N" value="0" min="0">
        </div>
        <div class="ore-input-grid">
            <div style="font-size:12px;">スロット2</div>
            <input type="number" id="inh_s2_R" value="0" min="0">
            <input type="number" id="inh_s2_B" value="0" min="0">
            <input type="number" id="inh_s2_Y" value="0" min="0">
            <input type="number" id="inh_s2_G" value="0" min="0">
            <input type="number" id="inh_s2_N" value="0" min="0">
        </div>
        <div class="ore-input-grid" style="margin-bottom:15px;">
            <div style="font-size:12px;">スロット3</div>
            <input type="number" id="inh_s3_R" value="0" min="0">
            <input type="number" id="inh_s3_B" value="0" min="0">
            <input type="number" id="inh_s3_Y" value="0" min="0">
            <input type="number" id="inh_s3_G" value="0" min="0">
            <input type="number" id="inh_s3_N" value="0" min="0">

        <div style="font-weight:bold; font-size:13px; margin-bottom:6px; color:#3498db;">■ 6つの練習の配置鉱石（パターンA入力）</div>

            <div class="ore-header" style="color:var(--color-yellow)">黄Y</div>
            <div class="ore-header" style="color:var(--color-green)">緑G</div>
            <div class="ore-header" style="color:var(--color-none)">無N</div>
        </div>
        <div class="ore-input-grid"><div>持久力</div><input type="number" id="p_0_R" value="1"><input type="number" id="p_0_B" value="0"><input type="number" id="p_0_Y" value="0"><input type="number" id="p_0_G" value="0"><input type="number" id="p_0_N" value="1"></div>
        <div class="ore-input-grid"><div>筋力</div><input type="number" id="p_1_R" value="2"><input type="number" id="p_1_B" value="0"><input type="number" id="p_1_Y" value="0"><input type="number" id="p_1_G" value="0"><input type="number" id="p_1_N" value="0"></div>
        <div class="ore-input-grid"><div>瞬発力</div><input type="number" id="p_2_B" value="1"><input type="number" id="p_2_R" value="0"><input type="number" id="p_2_Y" value="0"><input type="number" id="p_2_G" value="0"><input type="number" id="p_2_N" value="1"></div>
        <div class="ore-input-grid"><div>命中力</div><input type="number" id="p_3_Y" value="1"><input type="number" id="p_3_R" value="0"><input type="number" id="p_3_B" value="0"><input type="number" id="p_3_G" value="0"><input type="number" id="p_3_N" value="0"></div>
        <div class="ore-input-grid"><div>知力</div><input type="number" id="p_4_G" value="1"><input type="number" id="p_4_R" value="0"><input type="number" id="p_4_B" value="0"><input type="number" id="p_4_Y" value="0"><input type="number" id="p_4_N" value="0"></div>
        <div class="ore-input-grid"><div>精神力</div><input type="number" id="p_5_N" value="2"><input type="number" id="p_5_R" value="0"><input type="number" id="p_5_B" value="0"><input type="number" id="p_5_Y" value="0"><input type="number" id="p_5_G" value="0"></div>
    </div>

    <button class="btn-submit" onclick="executeAnalysis()">分析・最適手順を逆算する</button>

    <div id="result"></div>

<script>
// ==========================================
// DATA: レシピマトリクスデータ（画像とテキストを完全統合）
// ==========================================
const RECIPES = {
    red: {
        kakashi:  { R: 1, B: 0, Y: 0, G: 0, ALL: 0, base: 100 },
        ring:     { R: 1, B: 0, Y: 0, G: 0, ALL: 1, base: 200 },
        charm:    { R: 2, B: 0, Y: 0, G: 0, ALL: 1, base: 400 },
        bracelet: { R: 2, B: 1, Y: 0, G: 0, ALL: 1, base: 600 },
        necklace: { R: 4, B: 0, Y: 0, G: 0, ALL: 1, base: 1000 }
    },
    blue: {
        kakashi:  { R: 0, B: 1, Y: 0, G: 0, ALL: 0, base: 100 },
        ring:     { R: 0, B: 1, Y: 0, G: 0, ALL: 1, base: 200 },
        charm:    { R: 0, B: 2, Y: 0, G: 0, ALL: 1, base: 400 },
        bracelet: { R: 0, B: 2, Y: 0, G: 1, ALL: 1, base: 600 },
        necklace: { R: 0, B: 4, Y: 0, G: 0, ALL: 1, base: 1000 }
    },
    yellow: {
        kakashi:  { R: 0, B: 0, Y: 0, G: 0, ALL: 1, base: 150 },
        ring:     { R: 0, B: 0, Y: 0, G: 0, ALL: 2, base: 300 },
        charm:    { R: 0, B: 0, Y: 1, G: 0, ALL: 2, base: 500 },
        bracelet: { R: 0, B: 0, Y: 2, G: 0, ALL: 2, base: 800 },
        necklace: { R: 0, B: 0, Y: 3, G: 0, ALL: 2, base: 1200 }
    },
    green: {
        kakashi:  { R: 0, B: 0, Y: 0, G: 1, ALL: 0, base: 100 },
        ring:     { R: 0, B: 0, Y: 0, G: 1, ALL: 1, base: 200 },
        charm:    { R: 0, B: 0, Y: 0, G: 2, ALL: 1, base: 400 },
        bracelet: { R: 1, B: 0, Y: 0, G: 2, ALL: 1, base: 600 },
        necklace: { R: 0, B: 0, Y: 0, G: 4, ALL: 1, base: 1000 }
    },
    gold: {
        kakashi:  { R: 0, B: 0, Y: 1, G: 0, ALL: 0, base: 300 },
        ring:     { R: 0, B: 0, Y: 1, G: 0, ALL: 1, base: 500 },
        charm:    { R: 0, B: 0, Y: 1, G: 0, ALL: 2, base: 800 },
        bracelet: { R: 0, B: 0, Y: 1, G: 0, ALL: 3, base: 1200 },
        necklace: { R: 0, B: 0, Y: 1, G: 0, ALL: 4, base: 2000 }
    }
};

// 手持ちストックオブジェクト
let stocks = { red: 2, blue: 1, yellow: 1, green: 1, gold: 1 };

function changeStock(color, diff) {
    stocks[color] = Math.max(0, stocks[color] + diff);
    document.getElementById(`stock_${color}`).innerText = stocks[color];
}

function toggleAdvancedPanel() {
    const panel = document.getElementById('advancedPanel');
    panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
}

function updateSlotStyle(slotNum) {
    // 演出用スタイル調整（必要に応じて拡張可）
}

// ==========================================
// CORE: 共通スコア計算アルゴリズム (改善版)
// ==========================================
function calculateScore(s1, s2, s3, level) {
    let base1 = RECIPES[s1.color]?.[s1.type]?.base || 0;
    let base2 = RECIPES[s2.color]?.[s2.type]?.base || 0;
    let base3 = RECIPES[s3.color]?.[s3.type]?.base || 0;

    // カカシ倍率の決定
    let kakashiMult = 1.0;
    if (level === "初段") kakashiMult = 1.5;
    if (level === "二段") kakashiMult = 1.8;
    if (level === "三段") kakashiMult = 2.2;
    if (level === "皆伝") kakashiMult = 3.0;

    let p1 = s1.isCompleted ? base1 * (s1.type === 'kakashi' ? kakashiMult : 1) : 0;
    let p2 = s2.isCompleted ? base2 * (s2.type === 'kakashi' ? kakashiMult : 1) : 0;
    let p3 = s3.isCompleted ? base3 * (s3.type === 'kakashi' ? kakashiMult : 1) : 0;

    // 金色の特殊ルール（スロット1が金なら他スロットのスコア2倍）
    if (s1.color === 'gold' && s1.isCompleted) {
        p2 *= 2;
        p3 *= 2;
    }

    let total = Math.floor(p1 + p2 + p3);
    return { total, p1, p2, p3 };
}

// ==========================================
// CORE: 高度精密完成可能チェック（補足1：余剰のALL割り振りを考慮）
// ==========================================
function canCompleteItem(color, type, totalOres, level) {
    const recipe = RECIPES[color]?.[type];
    if (!recipe) return false;

    // 固定色の必要枚数チェック
    const diffR = totalOres.R - recipe.R;
    const diffB = totalOres.B - recipe.B;
    const diffY = totalOres.Y - recipe.Y;
    const diffG = totalOres.G - recipe.G;

    if (diffR < 0 || diffB < 0 || diffY < 0 || diffG < 0) return false;

    // 四段・皆伝ならALLの要求数を25%カット(端数切り捨て)
    let requiredAll = recipe.ALL;
    if (level === "四段" || level === "皆伝") {
        requiredAll = Math.floor(requiredAll * 0.75);
    }

    // 【補足1】有色の余剰（diff）＋ 無色N がALL枠への原資となる
    const poolForAll = diffR + diffB + diffY + diffG + totalOres.N;
    return poolForAll >= requiredAll;
}

// ==========================================
// MAIN: 実行・制御関数
// ==========================================
function executeAnalysis() {
    const level = document.getElementById('gameLevel').value;
    const currentScore = parseInt(document.getElementById('currentScore').value) || 0;
    const targetScore = parseInt(document.getElementById('targetScore').value) || 0;

    const s1 = { color: document.getElementById('s1_color').value, type: document.getElementById('s1_type').value };
    const s2 = { color: document.getElementById('s2_color').value, type: document.getElementById('s2_type').value };
    const s3 = { color: document.getElementById('s3_color').value, type: document.getElementById('s3_type').value };

    const isAdvanced = document.getElementById('advancedPanel').style.display === 'block';

    if (!isAdvanced) {
        // 従来通りの「全スロットが強制完成する前提の簡易逆算ルート」を実行
        runSimpleSimulation(s1, s2, s3, level, currentScore, targetScore);
    } else {
        // 新設：今ターンの練習環境と鉱石初期化を完全考慮した「精密高度分析」を実行
        runAdvancedSimulation(s1, s2, s3, level, currentScore, targetScore);
    }
}

// 従来のシミュレーター（リファクタリング版）

    let results = [];
    // 既存の入れ替え総当り
    const colors = ['red', 'blue', 'yellow', 'green', 'gold'];
    const types = ['kakashi', 'ring', 'charm', 'bracelet', 'necklace'];

    // 簡単のため、全完成を想定した既存ルートのスコアリング
    let comb = { s1: {...s1, isCompleted: true}, s2: {...s2, isCompleted: true}, s3: {...s3, isCompleted: true} };
    let res = calculateScore(comb.s1, comb.s2, comb.s3, level);

    html += `練習状況も含めて精密に分析したい場合は、上の<b>「精密な実現可能性分析を開く」</b>ボタンを押して詳細を入力してください。</div>`;
    
    document.getElementById('result').innerHTML = html;
}

// ==========================================
// NEW CORE: 精密高度シミュレーター
// ==========================================
function runAdvancedSimulation(s1, s2, s3, level, currentScore, targetScore) {
    // 1. 引き継ぎ鉱石の取得
    const inherited = [
        {
            R: parseInt(document.getElementById('inh_s1_R').value) || 0,
            B: parseInt(document.getElementById('inh_s1_B').value) || 0,
            Y: parseInt(document.getElementById('inh_s1_Y').value) || 0,
            G: parseInt(document.getElementById('inh_s1_G').value) || 0,
            N: parseInt(document.getElementById('inh_s1_N').value) || 0
        },
        {
            R: parseInt(document.getElementById('inh_s2_R').value) || 0,
            B: parseInt(document.getElementById('inh_s2_B').value) || 0,
            Y: parseInt(document.getElementById('inh_s2_Y').value) || 0,
            G: parseInt(document.getElementById('inh_s2_G').value) || 0,
            N: parseInt(document.getElementById('inh_s2_N').value) || 0
        },
        {
            R: parseInt(document.getElementById('inh_s3_R').value) || 0,
            B: parseInt(document.getElementById('inh_s3_B').value) || 0,
            Y: parseInt(document.getElementById('inh_s3_Y').value) || 0,
            G: parseInt(document.getElementById('inh_s3_G').value) || 0,
            N: parseInt(document.getElementById('inh_s3_N').value) || 0
        }
    ];

    // 2. 6つの練習データの取得
    const practiceNames = ["持久力", "筋力", "瞬発力", "命中力", "知力", "精神力"];
    let practices = [];
    for (let i = 0; i < 6; i++) {
        practices.push({
            name: practiceNames[i],
            ores: {
                R: parseInt(document.getElementById(`p_${i}_R`)?.value) || 0,
                B: parseInt(document.getElementById(`p_${i}_B`)?.value) || 0,
                Y: parseInt(document.getElementById(`p_${i}_Y`)?.value) || 0,
                G: parseInt(document.getElementById(`p_${i}_G`)?.value) || 0,
                N: parseInt(document.getElementById(`p_${i}_N`)?.value) || 0
            }
        });
    }

    let validRoutes = [];

    // 【簡略化のための総当り設計】
    // ユーザーの利便性を考え、「入れ替えなし」と「手持ちストックを1つ使って変換（補足2,3）」の全実現パターンを検証
    const convertOptions = [
        { label: "変換なし", cost: null, ores: {R:0,B:0,Y:0,G:0,N:0} },
        { label: "赤レシピ変換", cost: "red", ores: {R:1,B:0,Y:0,G:0,N:0} },
        { label: "青レシピ変換", cost: "blue", ores: {R:0,B:1,Y:0,G:0,N:0} },
        { label: "黄レシピ変換", cost: "yellow", ores: {R:0,B:0,Y:1,G:0,N:0} },
        { label: "緑レシピ変換", cost: "green", ores: {R:0,B:0,Y:0,G:1,N:0} },
        { label: "金レシピ変換", cost: "gold", ores: {R:1,B:1,Y:1,G:1,N:0} } // 金は4色すべて+1
    ];

    // 6つの練習 × 6つの変換パターンをすべてシミュレート
    practices.forEach(practice => {
        convertOptions.forEach(opt => {
            // ストック枚数チェック
            if (opt.cost && stocks[opt.cost] <= 0) return;

            // 各スロットごとの最終計算
            let finalOres = [];
            for (let i = 0; i < 3; i++) {
                // 【補足3】変換による鉱石は、スロット1〜3すべてに等しく一律付与される
                finalOres.push({
                    R: inherited[i].R + opt.ores.R + practice.ores.R,
                    B: inherited[i].B + opt.ores.B + practice.ores.B,
                    Y: inherited[i].Y + opt.ores.Y + practice.ores.Y,
                    G: inherited[i].G + opt.ores.G + practice.ores.G,
                    N: inherited[i].N + opt.ores.N + practice.ores.N
                });
            }

            // 完成判定
            const c1 = canCompleteItem(s1.color, s1.type, finalOres[0], level);
            const c2 = canCompleteItem(s2.color, s2.type, finalOres[1], level);
            const c3 = canCompleteItem(s3.color, s3.type, finalOres[2], level);

            // 1つでも完成したルートがあればスコア計算して採用
            if (c1 || c2 || c3) {
                let checkS1 = { ...s1, isCompleted: c1 };
                let checkS2 = { ...s2, isCompleted: c2 };
                let checkS3 = { ...s3, isCompleted: c3 };
                let scoreRes = calculateScore(checkS1, checkS2, checkS3, level);

                validRoutes.push({
                    practiceName: practice.name,
                    convertAction: opt.label,
                    completedStatus: `[SLOT1: ${c1?'値達成':'未達成'}, SLOT2: ${c2?'値達成':'未達成'}, SLOT3: ${c3?'値達成':'未達成'}]`,
                    score: scoreRes.total,
                    breakdown: scoreRes
                });
            }
        });
    });

    // スコアの高い順にソート
    validRoutes.sort((a, b) => b.score - a.score);

    // HTML出力
    let html = `<div style="font-weight: bold; color: #2ecc71; margin-bottom: 8px;">📊 精密実現ルート判定（利用可能手順：${validRoutes.length}件）：</div>`;
    
    if (validRoutes.length === 0) {
        html += `<div class="result-item" style="color:#e74c3c;">現在の練習の配置、および引き継ぎ・変換鉱石の状況では、今ターン中に完成させられるアイテムがありません。次のターンへ引き継ぎ（スロット1未達成時は破棄に注意）を検討してください。</div>`;
    } else {
        validRoutes.forEach((route, idx) => {
            const tag = idx === 0 ? '<span class="badge" style="background:#2ecc71">最適アクション</span>' : '';
            html += `<div class="result-item">`;
            html += `<div>${tag} <strong>【${route.practiceName}練習】を選択 ➔ 獲得スコア: +${route.score} pts</strong></div>`;
            html += `<div style="font-size:13px; margin-top:4px; color:#ccc;">・前処理アクション: <span style="color:#f1c40f">${route.convertAction}</span></div>`;
            html += `<div style="font-size:13px; color:#aaa;">・完成状況: ${route.completedStatus}</div>`;
            html += `</div>`;
        });
    }

    document.getElementById('result').innerHTML = html;
}
