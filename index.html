<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カジナイトアカデミー 鍛冶スコア逆算ツール</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: #262636;
            --primary-color: #3498db;
            --text-color: #f0f0f5;
            --border-color: #3a3a52;
            
            /* アイテム色の定義 */
            --color-red: #ff4d4d;
            --color-blue: #3399ff;
            --color-yellow: #f39c12;
            --color-green: #2ecc71;
            --color-gold: #f1c40f;
            
            /* スロット1の深い紫背景 */
            --slot1-bg: #1d142b;
            --slot1-border: #4a346b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 全体コンテナ */
        .container {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* タイトル */
        h1 {
            text-align: center;
            font-size: 22px;
            margin: 0 0 10px 0;
            color: #fff;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }

        /* 各スロットカード */
        .slot-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            background: #1f1f2e;
        }
        .slot-card.slot1-special {
            background: var(--slot1-bg);
            border: 1px solid var(--slot1-border);
            box-shadow: 0 0 10px rgba(74, 52, 107, 0.4);
        }

        /* スロット上部テキスト */
        .slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 10px;
        }
        
        /* 入力パーツを行形式に配置 */
        .slot-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* プルダウン幅調整 */
        .select-color {
            width: 85px;
            padding: 10px 5px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: #fff;
            font-weight: bold;
            text-align: center;
        }
        .select-type {
            width: 125px;
            padding: 10px 5px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #2c2c3e;
            color: #fff;
            font-weight: bold;
        }
        
        /* セレクトボックスの色分け */
        select.color-red { background-color: #ff4d4d !important; color: #fff !important; }
        select.color-blue { background-color: #3399ff !important; color: #fff !important; }
        select.color-yellow { background-color: var(--color-yellow) !important; color: #fff !important; }
        select.color-green { background-color: var(--color-green) !important; color: #fff !important; }
        select.color-gold { background-color: #f1c40f !important; color: #000 !important; }

        option[value="red"] { background-color: #ff4d4d; color: #fff; }
        option[value="blue"] { background-color: #3399ff; color: #fff; }
        option[value="yellow"] { background-color: #ffcc00; color: #000; }
        option[value="green"] { background-color: #2ecc71; color: #fff; }
        option[value="gold"] { background-color: #f1c40f; color: #000; }

        /* 逆算検索シミュレーターのスタイル */
        .search-box {
            padding: 15px;
            background: #1f1f2e;
            border-radius: 8px;
            border: 1px solid #3498db;
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .search-box h3 {
            margin: 0;
            font-size: 16px;
            color: #3498db;
            text-align: center;
        }
        
        /* クロス表（マトリクス）形式のスタイル */
        .stock-section {
            background: #14141f;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2c2c3e;
        }
        .stock-section-title {
            font-size: 13px;
            font-weight: bold;
            color: #a0a0b0;
            margin-bottom: 6px;
            text-align: center;
        }
        .stock-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            background: #191924;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .clear-btn {
            padding: 2px 8px;
            font-size: 11px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover { background: #c0392b; }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            table-layout: fixed;
        }
        .stock-table th, .stock-table td {
            border: 1px solid var(--border-color);
            padding: 5px 2px;
            text-align: center;
            vertical-align: middle;
        }
        .stock-table th {
            background: #2c2c3e;
            color: #fff;
            font-weight: bold;
        }
        .stock-table th:first-child, .stock-table td:first-child {
            width: 45px;
            font-weight: bold;
        }
        .row-hdr { background: #191924; }
        
        /* 表の中のボタンコントロール */
        .stock-ctrl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .stock-ctrl button {
            width: 18px;
            height: 18px;
            padding: 0;
            font-size: 12px;
            font-weight: bold;
            background: #3a3a52;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stock-ctrl button:hover { background: #4e4e6e; }
        .stock-ctrl span {
            min-width: 10px;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }
        .stock-ctrl span.has-count {
            color: #2ecc71;
            text-shadow: 0 0 5px rgba(46,204,113,0.5);
        }

        /* 文字色クラス */
        .text-red { color: var(--color-red); }
        .text-blue { color: var(--color-blue); }
        .text-yellow { color: var(--color-yellow); }
        .text-green { color: var(--color-green); }
        .text-gold { color: var(--color-gold); }

        /* 条件入力行 */
        .search-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #191924;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .search-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .search-group label {
            font-size: 14px;
        }
        .search-input {
            width: 100px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #2c2c3e;
            color: #fff;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
        }
        .level-select {
            width: 114px;
            padding: 6px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #2c2c3e;
            color: #fff;
            font-weight: bold;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #f0f0f5;
            cursor: pointer;
            user-select: none;
            justify-content: center;
            margin-top: 5px;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .search-btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background: #3498db;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .search-btn:hover { background: #2980b9; }
        
        .search-results {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #11111a;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid var(--border-color);
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #2a2a3a;
        }
        .result-item:last-child { border-bottom: none; }
        
        /* 注意書き文言 */
        .warning-box {
            font-size: 11px;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 10px;
            border-radius: 6px;
            line-height: 1.4;
        }
        
        /* リンクエリア */
        .footer-links {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            line-height: 1.8;
            width: 100%;
        }
        .footer-links p { margin: 8px 0; }
        .footer-links a { color: #3498db; text-decoration: none; word-break: break-all; }
        .footer-links a:hover { text-decoration: underline; }
        .support-link {
            background: #2c3e50;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px !important;
            border-left: 4px solid #e74c3c;
        }
        .support-link a { color: #ff7675; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>カジナイトアカデミー<br>鍛冶スコア逆算ツール</h1>

    <div class="slot-card slot1-special">
        <div class="slot-header">
            <span>スロット 1 (現在の状態)</span>
        </div>
        <div class="slot-row">
            <select id="color1" onchange="updateSelectColor(1);" class="select-color color-red">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type1" class="select-type">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-header">
            <span>スロット 2 (現在の状態)</span>
        </div>
        <div class="slot-row">
            <select id="color2" onchange="updateSelectColor(2);" class="select-color color-red">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type2" class="select-type">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="slot-card">
        <div class="slot-header">
            <span>スロット 3 (現在の状態)</span>
        </div>
        <div class="slot-row">
            <select id="color3" onchange="updateSelectColor(3);" class="select-color color-red">
                <option value="red">赤色</option>
                <option value="blue">青色</option>
                <option value="yellow">黄色</option>
                <option value="green">緑色</option>
                <option value="gold">金色</option>
            </select>
            <select id="type3" class="select-type">
                <option value="kakashi">カカシ</option>
                <option value="ring">指輪</option>
                <option value="charm">チャーム</option>
                <option value="bracelet">腕輪</option>
                <option value="necklace">首飾り</option>
            </select>
        </div>
    </div>

    <div class="search-box">
        <h3>目標ポイント達成シミュレーター</h3>
        <p style="font-size: 11px; color: #a0a0b0; text-align: center; margin: -5px 0 5px 0;">
            現在の点数から目標点に届く（または最高得点を狙える）ストック消費ルートを割り出します。
        </p>

        <div class="stock-section">
            <div class="stock-section-title">手持ちのストックアイテム（直接タップで増減）</div>
            
            <div class="stock-status-bar">
                <span>登録数: <strong id="totalStockDisp">0</strong> / <span id="maxStockDisp">3</span> 枠</span>
                <button onclick="clearStock()" class="clear-btn">全クリア</button>
            </div>

            <table class="stock-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>カカシ</th>
                        <th>指輪</th>
                        <th>チャム</th>
                        <th>腕輪</th>
                        <th>首飾</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="row-hdr text-red">赤色</td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('red', 'kakashi', -1)">-</button><span id="stock-red-kakashi">0</span><button onclick="adjustStock('red', 'kakashi', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('red', 'ring', -1)">-</button><span id="stock-red-ring">0</span><button onclick="adjustStock('red', 'ring', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('red', 'charm', -1)">-</button><span id="stock-red-charm">0</span><button onclick="adjustStock('red', 'charm', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('red', 'bracelet', -1)">-</button><span id="stock-red-bracelet">0</span><button onclick="adjustStock('red', 'bracelet', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('red', 'necklace', -1)">-</button><span id="stock-red-necklace">0</span><button onclick="adjustStock('red', 'necklace', 1)">+</button></div></td>
                    </tr>
                    <tr>
                        <td class="row-hdr text-blue">青色</td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('blue', 'kakashi', -1)">-</button><span id="stock-blue-kakashi">0</span><button onclick="adjustStock('blue', 'kakashi', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('blue', 'ring', -1)">-</button><span id="stock-blue-ring">0</span><button onclick="adjustStock('blue', 'ring', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('blue', 'charm', -1)">-</button><span id="stock-blue-charm">0</span><button onclick="adjustStock('blue', 'charm', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('blue', 'bracelet', -1)">-</button><span id="stock-blue-bracelet">0</span><button onclick="adjustStock('blue', 'bracelet', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('blue', 'necklace', -1)">-</button><span id="stock-blue-necklace">0</span><button onclick="adjustStock('blue', 'necklace', 1)">+</button></div></td>
                    </tr>
                    <tr>
                        <td class="row-hdr text-yellow">黄色</td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('yellow', 'kakashi', -1)">-</button><span id="stock-yellow-kakashi">0</span><button onclick="adjustStock('yellow', 'kakashi', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('yellow', 'ring', -1)">-</button><span id="stock-yellow-ring">0</span><button onclick="adjustStock('yellow', 'ring', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('yellow', 'charm', -1)">-</button><span id="stock-yellow-charm">0</span><button onclick="adjustStock('yellow', 'charm', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('yellow', 'bracelet', -1)">-</button><span id="stock-yellow-bracelet">0</span><button onclick="adjustStock('yellow', 'bracelet', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('yellow', 'necklace', -1)">-</button><span id="stock-yellow-necklace">0</span><button onclick="adjustStock('yellow', 'necklace', 1)">+</button></div></td>
                    </tr>
                    <tr>
                        <td class="row-hdr text-green">緑色</td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('green', 'kakashi', -1)">-</button><span id="stock-green-kakashi">0</span><button onclick="adjustStock('green', 'kakashi', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('green', 'ring', -1)">-</button><span id="stock-green-ring">0</span><button onclick="adjustStock('green', 'ring', 1)">+</button></div></td>
                        <td><div class="stock-ctrl"><button onclick="adjustStock('green', 'charm', -1)">-</button><span id="stock-green-charm">0</span><button onclick="adjustStock('green', 'charm', 1)">+</button></div></td>
                        <td><div class="
